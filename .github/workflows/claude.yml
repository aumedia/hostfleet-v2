# Caller stub — defers to the shared reusable Claude workflow.
# Canonical source: Develguru/.github/.github/workflows/claude.yml
# (mirrored to aumedia/.github automatically).

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude') || (github.event.action == 'assigned' && github.event.assignee.login == 'claude')))
    uses: aumedia/.github/.github/workflows/claude.yml@main
    with:
      model: ${{ vars.CLAUDE_MODEL }}
    secrets: inherit
